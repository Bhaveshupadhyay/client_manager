apiVersion: apps/v1
kind: Deployment
metadata:
  name: clientmanager-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: clientmanager-api

  template:
    metadata:
      labels:
        app: clientmanager-api

    spec:
      containers:
        - name: api

          image: <IMAGE_PLACEHOLDER>

          ports:
            - containerPort: 8000