apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: jwt-auth
  namespace: default
plugin: jwt
config:
  # Kong will look for the token in the Authorization: Bearer header
  header_names:
    - authorization
  # Force Kong to reject tokens if the 'exp' (expiration) timestamp has passed
  claims_to_verify:
    - exp