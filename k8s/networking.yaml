---
# 1. The Service (Internal Routing)
apiVersion: v1
kind: Service
metadata:
  name: clientmanager-service
spec:
  selector:
    app: clientmanager-api # This must match the label in your deployment.yaml
  ports:
    - protocol: TCP
      port: 80           # The port the cluster exposes internally
      targetPort: 8000   # The exact port Uvicorn is running on
  type: ClusterIP

---
# 2. The Ingress (External Routing & HTTPS)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clientmanager-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # This tells cert-manager to automatically generate your SSL certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - clientmanger.tech
      # Kubernetes will store your SSL certificate inside this secret name
      secretName: clientmanager-tls-secret
  rules:
    - host: clientmanger.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clientmanager-service
                port:
                  number: 80